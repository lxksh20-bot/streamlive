<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamLive — Live Sports Streaming</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#000;color:#fff;font-family:'Rajdhani',sans-serif;overflow:hidden;}
.stars{position:fixed;inset:0;z-index:0;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle var(--d) ease-in-out infinite var(--delay);}
@keyframes twinkle{0%,100%{opacity:0.08;}50%{opacity:0.7;}}
.orb1{position:fixed;width:700px;height:700px;background:radial-gradient(circle,rgba(255,50,50,0.06),transparent 70%);top:-300px;left:-200px;border-radius:50%;pointer-events:none;z-index:0;}
.orb2{position:fixed;width:600px;height:600px;background:radial-gradient(circle,rgba(0,150,255,0.05),transparent 70%);bottom:-200px;right:-150px;border-radius:50%;pointer-events:none;z-index:0;}

.center{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;gap:0;}

/* Animated sport icons row */
.sports-icons{display:flex;gap:18px;margin-bottom:36px;flex-wrap:wrap;justify-content:center;}
.si{font-size:1.8rem;animation:float var(--fd) ease-in-out infinite var(--fdelay);opacity:0.6;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}

.logo{font-family:'Teko',sans-serif;font-size:clamp(2.8rem,9vw,5rem);font-weight:700;letter-spacing:5px;line-height:1;margin-bottom:6px;}
.logo-stream{color:#fff;}
.logo-live{color:#ff4444;text-shadow:0 0 30px rgba(255,68,68,0.5);}

.tagline{font-size:clamp(0.75rem,2vw,0.92rem);letter-spacing:4px;text-transform:uppercase;color:rgba(255,255,255,0.25);margin-bottom:36px;font-weight:600;}

.live-pill{display:flex;align-items:center;gap:8px;background:rgba(255,68,68,0.08);border:1px solid rgba(255,68,68,0.2);padding:7px 18px;border-radius:30px;margin-bottom:36px;}
.ldot{width:8px;height:8px;background:#ff4444;border-radius:50%;animation:pulse 1.2s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 6px #ff4444;}50%{opacity:0.3;box-shadow:none;}}
.ltext{font-size:0.75rem;font-weight:700;letter-spacing:3px;color:#ff6666;text-transform:uppercase;}

.tg-btn{display:inline-flex;align-items:center;gap:12px;background:linear-gradient(135deg,#229ed9,#1a7fb5);color:#fff;padding:17px 42px;border-radius:50px;font-family:'Teko',sans-serif;font-size:1.25rem;font-weight:600;letter-spacing:2px;text-decoration:none;text-transform:uppercase;box-shadow:0 8px 40px rgba(34,158,217,0.3);transition:transform 0.2s,box-shadow 0.2s;}
.tg-btn:hover{transform:translateY(-3px);box-shadow:0 16px 50px rgba(34,158,217,0.45);}

.sub{margin-top:18px;font-size:0.76rem;color:rgba(255,255,255,0.18);letter-spacing:2px;text-transform:uppercase;}

.bottom{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);font-size:0.65rem;color:rgba(255,255,255,0.08);letter-spacing:2px;text-transform:uppercase;z-index:1;white-space:nowrap;}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="orb1"></div>
<div class="orb2"></div>

<div class="center">
  <div class="sports-icons">
    <span class="si" style="--fd:3.2s;--fdelay:0s">🏏</span>
    <span class="si" style="--fd:2.8s;--fdelay:-0.5s">⚽</span>
    <span class="si" style="--fd:3.5s;--fdelay:-1s">🏀</span>
    <span class="si" style="--fd:2.6s;--fdelay:-0.3s">🎾</span>
    <span class="si" style="--fd:3.1s;--fdelay:-1.5s">🏒</span>
    <span class="si" style="--fd:2.9s;--fdelay:-0.8s">🏈</span>
    <span class="si" style="--fd:3.3s;--fdelay:-0.2s">🥊</span>
    <span class="si" style="--fd:2.7s;--fdelay:-1.2s">🏎️</span>
  </div>

  <div class="logo">
    <span class="logo-stream">STREAM</span><span class="logo-live">LIVE</span>
  </div>
  <div class="tagline">All Sports · Live Streaming · Free</div>

  <div class="live-pill">
    <div class="ldot"></div>
    <div class="ltext">Events Live Now</div>
  </div>

  <!-- ✏️ Change to your Telegram channel -->
  <a href="https://t.me/+x2z1kIkmW9M0ZTkx" class="tg-btn" target="_blank">
    ✈️ &nbsp;Join Telegram for Live Links
  </a>
  <div class="sub">Cricket · Football · Basketball · Tennis · MMA & more</div>
</div>

<div class="bottom">StreamLive © 2025</div>

<script>
const s=document.getElementById('stars');
for(let i=0;i<130;i++){
  const el=document.createElement('div');
  el.className='star';
  const sz=Math.random()*2+0.4;
  el.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*5}s;--delay:-${Math.random()*5}s;`;
  s.appendChild(el);
}
</script>
</body>
</html>
