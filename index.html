<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreamLive — Live Sports</title>
    <link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background:#000; color:#fff; font-family:'Rajdhani', sans-serif; text-align: center; padding: 50px 20px; }
        .logo { font-family:'Teko'; font-size: 4rem; letter-spacing: 3px; line-height: 1; margin-bottom: 40px; }
        .logo span { color: #ff4444; }
        
        .grid { display: flex; flex-direction: column; gap: 20px; max-width: 550px; margin: 0 auto; }
        
        /* Updated Card Design */
        .match-card { 
            display: block; 
            background: #0a0a0a; 
            border: 1px solid #1a1a1a; 
            border-radius: 14px; 
            text-decoration: none; 
            color: #fff; 
            text-align: left; 
            transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s; 
            overflow: hidden; /* Keeps the image inside the rounded corners */
        }
        .match-card:hover { 
            transform: translateY(-4px); 
            border-color: #333; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        
        /* New Thumbnail Section */
        .card-thumb {
            width: 100%;
            aspect-ratio: 16/9; /* Standard video format */
            background-color: #111;
            background-size: cover;
            background-position: center;
            border-bottom: 1px solid #1a1a1a;
        }
        
        /* Information Section */
        .card-info { padding: 20px; }
        .live-badge { color: #ff4444; font-weight: 700; font-size: 0.8rem; letter-spacing: 2px; display: flex; align-items: center; gap: 6px; }
        .live-badge::before { content: ''; display: inline-block; width: 8px; height: 8px; background: #ff4444; border-radius: 50%; animation: pulse 1.5s infinite; }
        .m-title { font-family: 'Teko'; font-size: 2rem; margin: 5px 0 2px 0; line-height: 1.1; letter-spacing: 0.5px; }
        .m-sub { color: #888; font-size: 1rem; font-weight: 500; }

        @keyframes pulse { 0% { transform: scale(0.9); opacity: 1; } 70% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(0.9); opacity: 1; } }
    </style>
</head>
<body>

    <div class="logo">STREAM<span>LIVE</span></div>
    
    <div class="grid" id="matchList">
        <p style="color:#555;">Loading live feeds...</p>
    </div>

    <script type="module">
        import { db } from './assets/js/db.js';

        const container = document.getElementById('matchList');

        // 💥 We wrap the exact same rendering logic inside the real-time listener
        db.listenToMatches((matches) => {
            container.innerHTML = ''; // Clear the grid completely every time data updates

            if (matches.length === 0) {
                container.innerHTML = '<p style="color:#555; font-size: 1.2rem;">No matches currently live.</p>';
                return;
            }

            // Filter for live matches and sort them (newest first)
            const liveMatches = matches
                .filter(m => m.status === 'live')
                .sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            if (liveMatches.length === 0) {
                container.innerHTML = '<p style="color:#555; font-size: 1.2rem;">No matches currently live.</p>';
                return;
            }

            // Loop through live matches and create HTML
            liveMatches.forEach(match => {
                const card = document.createElement('a');
                card.href = `match.html?id=${match.id}`;
                card.className = 'match-card';
                
                const thumbStyle = match.posterUrl 
                    ? `background-image: url('${match.posterUrl}');` 
                    : `background: linear-gradient(135deg, #1a1a1a 0%, #050505 100%);`;

                // Generate a random viewer count between 2,500 and 14,000
                const viewers = Math.floor(Math.random() * (14000 - 2500 + 1)) + 2500;

                card.innerHTML = `
                    <div class="card-thumb" style="${thumbStyle}"></div>
                    <div class="card-info">
                        <div style="display:flex; justify-content:space-between; align-items:center;">
                            <div class="live-badge">LIVE NOW</div>
                            <div style="color:#aaa; font-size:0.85rem; font-weight:600;">👁 ${viewers.toLocaleString()}</div>
                        </div>
                        <div class="m-title">${match.title}</div>
                        <div class="m-sub">${match.subtitle || match.tournament || 'Live Broadcast'}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        });
    </script>
</body>
</html>
