<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StreamLive — Premium Sports Streaming</title>
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@600;700&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { min-height:100%; background:#050505; color:#fff; font-family:'Rajdhani',sans-serif; overflow-x:hidden; }
  
  /* Animated Background */
  .stars { position:fixed; inset:0; z-index:0; }
  .star { position:absolute; background:#fff; border-radius:50%; animation:twinkle var(--d) ease-in-out infinite var(--delay); }
  @keyframes twinkle { 0%,100%{opacity:0.1;} 50%{opacity:0.8;} }
  .orb { position:fixed; border-radius:50%; filter:blur(90px); pointer-events:none; z-index:0; }
  .orb1 { width:600px; height:600px; background:radial-gradient(circle,rgba(255,68,68,0.08),transparent 70%); top:-100px; left:-100px; }
  .orb2 { width:500px; height:500px; background:radial-gradient(circle,rgba(34,158,217,0.08),transparent 70%); bottom:-100px; right:-100px; }

  /* Main Container */
  .container { position:relative; z-index:1; max-width:800px; margin:0 auto; padding:40px 20px; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; }
  
  /* Header */
  .logo { font-family:'Teko',sans-serif; font-size:clamp(3.5rem, 10vw, 5.5rem); font-weight:700; letter-spacing:4px; line-height:1; margin-bottom:5px; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }
  .logo span { background:linear-gradient(135deg,#ff4444,#ff8c42); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .tagline { font-size:1.1rem; letter-spacing:4px; text-transform:uppercase; color:rgba(255,255,255,0.4); margin-bottom:50px; font-weight:600; text-align:center; }

  /* Main Telegram Button */
  .tg-banner { width:100%; max-width:600px; display:flex; flex-direction:column; align-items:center; background:linear-gradient(135deg, rgba(34,158,217,0.1), rgba(26,127,181,0.05)); border:1px solid rgba(34,158,217,0.2); border-radius:24px; padding:40px 30px; text-align:center; transition:transform 0.3s; box-shadow:0 20px 50px rgba(0,0,0,0.5); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); }
  .tg-banner:hover { transform:translateY(-5px); border-color:rgba(34,158,217,0.4); }
  .tg-title { font-family:'Teko',sans-serif; font-size:2.2rem; letter-spacing:1px; margin-bottom:12px; }
  .tg-sub { font-size:1rem; color:rgba(255,255,255,0.6); margin-bottom:30px; line-height:1.6; }
  
  .tg-btn { display:inline-flex; align-items:center; gap:12px; background:linear-gradient(135deg,#229ed9,#1a7fb5); color:#fff; padding:16px 40px; border-radius:12px; font-family:'Teko',sans-serif; font-size:1.5rem; letter-spacing:2px; text-decoration:none; text-transform:uppercase; box-shadow:0 8px 30px rgba(34,158,217,0.3); transition:all 0.2s; }
  .tg-btn:hover { transform:scale(1.03); box-shadow:0 12px 40px rgba(34,158,217,0.5); }

  footer { position:absolute; bottom:20px; font-size:0.75rem; color:rgba(255,255,255,0.2); letter-spacing:2px; text-transform:uppercase; }
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="container">
  
  <div class="logo">Stream<span>Live</span></div>
  <div class="tagline">Premium Sports Streaming</div>

  <div class="tg-banner">
    <div class="tg-title">Never Miss A Match</div>
    <div class="tg-sub">Join our Telegram channel to get direct HD stream links 15 minutes before every match starts.</div>
    <a href="https://t.me/+uRfBrtl9y0g5NmU5" class="tg-btn" target="_blank">
      <span>✈️</span> Join Telegram Channel
    </a>
  </div>

  <footer>StreamLive © 2026</footer>
</div>

<script>
// Animated background stars
const s = document.getElementById('stars');
for(let i=0; i<100; i++){
  const el = document.createElement('div');
  el.className = 'star';
  const sz = Math.random()*2+0.5;
  el.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:-${Math.random()*4}s;`;
  s.appendChild(el);
}
</script>
</body>
</html>
